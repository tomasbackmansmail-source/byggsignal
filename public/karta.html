<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByggSignal — Karta</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --forest:      #1C3829;
  --forest-mid:  #2A5240;
  --sage:        #4A7C59;
  --mint:        #E8F2EC;
  --mint-mid:    #A8CCBA;
  --cream:       #F8F8F6;
  --white:       #FFFFFF;
  --ink:         #1A1A1A;
  --ink-light:   #5A5A5A;
  --ink-lighter: #AAAAAA;
  --border:      #EBEBEB;
  --border-soft: #F4F4F4;
  --gold:        #B8860B;
  --gold-bg:     #FDF8EC;
  --gold-border: #F0D98A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  height: 54px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(248,248,246,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.nav-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--forest);
  letter-spacing: -0.3px;
  text-decoration: none;
}
.nav-logo span { color: var(--sage); }

.demo-page { padding-top: 54px; }
.demo-body {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 20px;
}
.demo-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--ink-lighter);
  font-weight: 500;
  margin-bottom: 12px;
}

/* ─── MINI WIDGET ─────────────────────────────────────────────────── */
#widget {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.widget-map-box {
  width: 80px;
  height: 80px;
  border-radius: 14px;
  overflow: hidden;
  background: var(--mint);
  border: 1.5px solid var(--border);
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
#widget:hover .widget-map-box {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(28,56,41,0.18);
}
#mini-svg { width: 100%; height: 100%; display: block; }
.widget-badge {
  position: absolute;
  bottom: 5px; right: 5px;
  background: var(--forest);
  color: #fff;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 100px;
  line-height: 1.4;
  white-space: nowrap;
}
.widget-footer { margin-top: 6px; text-align: center; }
.widget-label { display: block; font-size: 11px; font-weight: 500; color: var(--forest); }
.widget-sub   { display: block; font-size: 10px; color: var(--ink-lighter); font-weight: 300; }

/* ─── OVERLAY ─────────────────────────────────────────────────────── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  backdrop-filter: blur(2px);
}
#overlay.open    { display: block; }
#overlay.visible { opacity: 1; }

/* ─── BOTTOM SHEET ────────────────────────────────────────────────── */
#sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 201;
  height: 90vh;
  max-height: 820px;
  background: var(--white);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 40px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
}
#sheet.open { transform: translateY(0); }

.drag-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.sheet-title {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--forest);
  letter-spacing: -0.3px;
}
.sheet-sub {
  font-size: 12px;
  color: var(--ink-lighter);
  font-weight: 300;
  margin-top: 1px;
}
.sheet-actions { display: flex; gap: 8px; align-items: center; }

.btn-rensa {
  font-family: inherit;
  font-size: 12px; font-weight: 500;
  color: var(--sage);
  background: var(--mint);
  border: 1px solid var(--sage);
  padding: 5px 12px;
  border-radius: 100px;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.btn-rensa:hover              { background: var(--sage); color: var(--white); }
.btn-rensa:disabled           { opacity: 0.35; cursor: default; }
.btn-rensa:disabled:hover     { background: var(--mint); color: var(--sage); }

.btn-close {
  font-family: inherit;
  font-size: 20px; line-height: 1;
  color: var(--ink-lighter);
  background: var(--border-soft);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.btn-close:hover { background: var(--border); }

/* ─── SHEET BODY ──────────────────────────────────────────────────── */
.sheet-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ─── MAP AREA ────────────────────────────────────────────────────── */
.map-wrap {
  flex: 1;
  position: relative;
  background: #d4e8f0;   /* water colour */
  overflow: hidden;
}
#full-svg { width: 100%; height: 100%; display: block; }

.map-loader {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--ink-lighter);
  background: #d4e8f0;
  z-index: 5;
  transition: opacity 0.4s;
}
.map-loader.hidden { opacity: 0; pointer-events: none; }

.kommune {
  cursor: pointer;
  stroke: rgba(255,255,255,0.7);
  stroke-width: 0.5;
  transition: filter 0.1s;
}
.kommune:hover   { filter: brightness(1.12); stroke: #fff; stroke-width: 1; }
.kommune.selected { stroke: var(--gold); stroke-width: 2; }
.kommune.dimmed  { opacity: 0.4; }

/* ─── TOOLTIP ─────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 300;
  background: var(--forest);
  color: #fff;
  border-radius: 10px;
  padding: 10px 13px;
  font-size: 13px;
  line-height: 1.5;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  opacity: 0;
  transition: opacity 0.1s;
  max-width: 190px;
}
#tooltip.show  { opacity: 1; }
.tt-name       { font-weight: 500; font-size: 14px; }
.tt-count      { color: rgba(255,255,255,0.7); font-size: 12px; }
.tt-hint       { color: var(--gold); font-size: 11px; margin-top: 3px; }

/* ─── LEGEND ──────────────────────────────────────────────────────── */
.legend {
  position: absolute;
  bottom: 16px; left: 14px;
  background: rgba(255,255,255,0.93);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 11px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  pointer-events: none;
}
.legend-title {
  font-weight: 500;
  color: var(--forest);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-swatch {
  width: 12px; height: 12px;
  border-radius: 3px;
  border: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.legend-lbl { color: var(--ink-light); }

/* ─── SELECTED PANEL ──────────────────────────────────────────────── */
.sel-panel {
  width: 240px;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--white);
}
.sel-panel-hdr {
  padding: 14px 16px 10px;
  font-size: 11px; font-weight: 500;
  color: var(--ink-lighter);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.sel-list { flex: 1; overflow-y: auto; padding: 8px 10px; }
.sel-empty {
  padding: 16px;
  font-size: 13px;
  color: var(--ink-lighter);
  font-weight: 300;
  line-height: 1.6;
}
.sel-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-radius: 7px;
  margin-bottom: 3px;
  cursor: pointer;
  background: var(--cream);
  border: 1px solid var(--border-soft);
  transition: background 0.12s;
}
.sel-item:hover { background: var(--mint); }
.sel-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sel-name { flex: 1; font-size: 12px; font-weight: 500; }
.sel-count { font-size: 11px; color: var(--ink-lighter); }
.sel-x { font-size: 14px; color: var(--ink-lighter); opacity: 0.5; }
.sel-item:hover .sel-x { opacity: 1; }

.sel-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.sel-total-row { display: flex; justify-content: space-between; align-items: baseline; }
.sel-total-lbl { font-size: 11px; color: var(--ink-lighter); }
.sel-total-val { font-size: 17px; font-weight: 500; color: var(--forest); }

/* ─── MOBILE ──────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  #sheet { height: 92vh; max-height: none; }
  .sheet-body { flex-direction: column; }
  .map-wrap { flex: 1; min-height: 0; }
  .sel-panel {
    width: 100%;
    height: 150px;
    flex-shrink: 0;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  .sel-panel-hdr { display: none; }
  .sel-list {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px 12px;
    gap: 6px;
  }
  .sel-item { flex-shrink: 0; min-width: 120px; flex-direction: column; align-items: flex-start; gap: 4px; }
  .sel-footer { width: 110px; flex-shrink: 0; justify-content: center; display: flex; flex-direction: column; }
}
</style>
</head>
<body>

<div class="demo-page">
  <nav>
    <a class="nav-logo" href="/">Bygg<span>Signal</span></a>
  </nav>
  <div class="demo-body">
    <div class="demo-label">Karta — klicka för att expandera</div>

    <div id="widget" role="button" tabindex="0"
         aria-label="Öppna karta över Stockholms kommuner"
         onclick="openSheet()"
         onkeydown="if(event.key==='Enter'||event.key===' ')openSheet()">
      <div class="widget-map-box">
        <svg id="mini-svg" viewBox="0 0 80 80" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="widget-badge" id="widget-badge">—</div>
      </div>
      <div class="widget-footer">
        <span class="widget-label">Stockholm</span>
        <span class="widget-sub" id="widget-sub">Laddar…</span>
      </div>
    </div>
  </div>
</div>

<div id="overlay" onclick="closeSheet()"></div>

<div id="sheet" role="dialog" aria-modal="true">
  <div class="drag-handle"></div>
  <div class="sheet-header">
    <div>
      <div class="sheet-title">Stockholms kommuner</div>
      <div class="sheet-sub" id="sheet-sub">Laddar data…</div>
    </div>
    <div class="sheet-actions">
      <button class="btn-rensa" id="btn-rensa" disabled onclick="clearSelection()">Rensa val</button>
      <button class="btn-close" onclick="closeSheet()" aria-label="Stäng">×</button>
    </div>
  </div>
  <div class="sheet-body">
    <div class="map-wrap" id="map-wrap">
      <svg id="full-svg"></svg>
      <div class="legend" id="legend">
        <div class="legend-title">Bygglov totalt</div>
      </div>
      <div class="map-loader" id="map-loader">Laddar karta…</div>
    </div>
    <div class="sel-panel">
      <div class="sel-panel-hdr">Valda kommuner</div>
      <div class="sel-list" id="sel-list">
        <div class="sel-empty" id="sel-empty">Klicka på en kommun för att markera</div>
      </div>
      <div class="sel-footer">
        <div class="sel-total-row">
          <span class="sel-total-lbl">Totalt</span>
          <span class="sel-total-val" id="sel-total">—</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-count" id="tt-count"></div>
  <div class="tt-hint" id="tt-hint"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
'use strict';

/* ─── CONFIG ──────────────────────────────────────────────────────── */
const GEOJSON_URL   = 'https://raw.githubusercontent.com/okfse/sweden-geojson/master/swedish_municipalities.geojson';
const PERMITS_URL   = '/api/permits';
const STOCKHOLM_LAN = '01';

/* Green choropleth ramp: light mint → deep forest */
const COLOR_STEPS = ['#E8F2EC', '#A8CCBA', '#4A7C59', '#2A5240', '#1C3829'];

/*
 * Permits database uses "Stockholm stad" but GeoJSON has "Stockholm".
 * Map GeoJSON kom_namn → permits kommun name where they differ.
 */
const GEO_TO_PERMIT = {
  'Stockholm':       'Stockholm stad',
  'Upplands Väsby':  'Upplands Väsby',
  'Upplands-Bro':    'Upplands-Bro',
};

/* ─── STATE ───────────────────────────────────────────────────────── */
let geoData         = null;
let permitsByKommun = {};
let colorScale      = null;
let fullMapRendered  = false;
const selected      = new Set();

/* ─── NORMALISE ───────────────────────────────────────────────────── */
function norm(s) { return (s || '').trim().toLowerCase(); }

function permitKey(geoName) {
  return norm(GEO_TO_PERMIT[geoName] || geoName);
}

function getPermits(geoName) {
  return permitsByKommun[permitKey(geoName)] || 0;
}

function getColor(geoName) {
  return colorScale ? colorScale(getPermits(geoName)) : COLOR_STEPS[0];
}

/* ─── FETCH + INIT ────────────────────────────────────────────────── */
async function init() {
  const [geoResp, permitsResp] = await Promise.allSettled([
    fetch(GEOJSON_URL),
    fetch(PERMITS_URL)
  ]);

  /* GeoJSON */
  if (geoResp.status !== 'fulfilled' || !geoResp.value.ok) {
    showError('Kunde inte ladda kartdata.');
    return;
  }
  const allGeo = await geoResp.value.json();
  geoData = {
    type: 'FeatureCollection',
    features: allGeo.features.filter(f =>
      f.properties && String(f.properties.lan_code) === STOCKHOLM_LAN
    )
  };

  if (geoData.features.length === 0) {
    showError('Inga kommuner hittades för Stockholms län.');
    return;
  }

  /* Permits */
  if (permitsResp.status === 'fulfilled' && permitsResp.value.ok) {
    const raw = await permitsResp.value.json();
    if (Array.isArray(raw)) {
      raw.forEach(p => {
        const k = norm(p.kommun);
        if (k) permitsByKommun[k] = (permitsByKommun[k] || 0) + 1;
      });
    }
  }

  /* Color scale — quantile over permit counts per municipality */
  const counts = geoData.features.map(f => getPermits(f.properties.kom_namn));
  colorScale = d3.scaleQuantile()
    .domain(counts.filter(c => c > 0).concat([0]))
    .range(COLOR_STEPS);

  buildLegend();
  renderMiniMap();
  updateWidget();

  /* Full map rendered on first sheet open (needs real dimensions) */
}

/* ─── LEGEND ──────────────────────────────────────────────────────── */
function buildLegend() {
  const q = colorScale.quantiles();
  const fmt = n => Math.round(n).toLocaleString('sv-SE');
  const labels = [
    `0 – ${fmt(q[0])}`,
    `${fmt(q[0])+1} – ${fmt(q[1])}`,
    `${fmt(q[1])+1} – ${fmt(q[2])}`,
    `${fmt(q[2])+1} – ${fmt(q[3])}`,
    `${fmt(q[3])+1}+`
  ];
  document.getElementById('legend').innerHTML =
    '<div class="legend-title">Bygglov totalt</div>' +
    COLOR_STEPS.map((c, i) =>
      `<div class="legend-row">
        <span class="legend-swatch" style="background:${c}"></span>
        <span class="legend-lbl">${labels[i]}</span>
       </div>`
    ).join('');
}

/* ─── MINI MAP (80×80) ────────────────────────────────────────────── */
function renderMiniMap() {
  if (!geoData) return;
  const svg  = d3.select('#mini-svg');
  const proj = d3.geoMercator();
  proj.fitExtent([[2, 2], [78, 78]], geoData);
  const path = d3.geoPath().projection(proj);
  svg.selectAll('path')
    .data(geoData.features)
    .join('path')
    .attr('d', path)
    .attr('fill', d => getColor(d.properties.kom_namn))
    .attr('stroke', 'rgba(255,255,255,0.6)')
    .attr('stroke-width', 0.3)
    .style('pointer-events', 'none');
}

/* ─── FULL MAP ────────────────────────────────────────────────────── */
function renderFullMap() {
  if (!geoData || fullMapRendered) return;
  fullMapRendered = true;

  const wrap = document.getElementById('map-wrap');
  const W    = wrap.clientWidth  || 500;
  const H    = wrap.clientHeight || 500;
  const PAD  = 24;

  const svg  = d3.select('#full-svg')
    .attr('viewBox', `0 0 ${W} ${H}`);

  const proj = d3.geoMercator();
  proj.fitExtent([[PAD, PAD], [W - PAD, H - PAD]], geoData);
  const path = d3.geoPath().projection(proj);

  const g = svg.append('g');

  /* Municipality polygons */
  g.selectAll('.kommune')
    .data(geoData.features)
    .join('path')
    .attr('class', 'kommune')
    .attr('d', path)
    .attr('fill', d => getColor(d.properties.kom_namn))
    .on('mousemove', onMouseMove)
    .on('mouseleave', onMouseLeave)
    .on('click', onClick);

  /* Labels — only if polygon is large enough */
  g.selectAll('.k-label')
    .data(geoData.features)
    .join('text')
    .attr('class', 'k-label')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('font-family', 'DM Sans, sans-serif')
    .attr('pointer-events', 'none')
    .attr('user-select', 'none')
    .each(function(d) {
      const [[x0,y0],[x1,y1]] = path.bounds(d);
      const w = x1 - x0, h = y1 - y0;
      const show = w > 32 && h > 16;
      const sz   = Math.min(Math.max(w / 7, 8), 12);
      const cnt  = getPermits(d.properties.kom_namn);
      const dark = cnt > (colorScale.quantiles()[2] || 0);
      d3.select(this)
        .attr('transform', () => {
          const [cx, cy] = path.centroid(d);
          return `translate(${cx},${cy})`;
        })
        .attr('font-size', show ? sz : 0)
        .attr('fill', dark ? 'rgba(255,255,255,0.88)' : 'rgba(28,56,41,0.75)')
        .text(show ? shortenName(d.properties.kom_namn) : '');
    });

  /* Re-project on resize */
  new ResizeObserver(() => {
    const nW = wrap.clientWidth;
    const nH = wrap.clientHeight;
    if (!nW || !nH) return;
    svg.attr('viewBox', `0 0 ${nW} ${nH}`);
    proj.fitExtent([[PAD, PAD], [nW - PAD, nH - PAD]], geoData);
    path.projection(proj);
    g.selectAll('.kommune').attr('d', path);
    g.selectAll('.k-label').each(function(d) {
      const [cx, cy] = path.centroid(d);
      d3.select(this).attr('transform', `translate(${cx},${cy})`);
      const [[x0,y0],[x1,y1]] = path.bounds(d);
      const w = x1 - x0, h = y1 - y0;
      const show = w > 32 && h > 16;
      const sz   = Math.min(Math.max(w / 7, 8), 12);
      d3.select(this)
        .attr('font-size', show ? sz : 0)
        .text(show ? shortenName(d.properties.kom_namn) : '');
    });
  }).observe(wrap);

  document.getElementById('map-loader').classList.add('hidden');
}

function shortenName(name) {
  const short = {
    'Upplands Väsby': 'Uppl. Väsby',
    'Upplands-Bro':   'Uppl.-Bro',
  };
  return short[name] || name;
}

/* ─── TOOLTIP ─────────────────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');

function onMouseMove(evt, d) {
  const name = d.properties.kom_namn || '—';
  const cnt  = getPermits(name);
  document.getElementById('tt-name').textContent  = name;
  document.getElementById('tt-count').textContent =
    cnt ? `${cnt.toLocaleString('sv-SE')} bygglov` : 'Inga bygglov registrerade';
  document.getElementById('tt-hint').textContent =
    selected.has(name) ? '↩ Avmarkera' : '+ Klicka för att markera';
  tooltip.classList.add('show');
  const x = Math.min(evt.clientX + 14, window.innerWidth - 196);
  const y = Math.max(evt.clientY - 10, 8);
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function onMouseLeave() { tooltip.classList.remove('show'); }

/* ─── CLICK / SELECT ──────────────────────────────────────────────── */
function onClick(evt, d) {
  const name = d.properties.kom_namn;
  if (!name) return;
  selected.has(name) ? selected.delete(name) : selected.add(name);
  refreshClasses();
  renderSelPanel();
  if (tooltip.classList.contains('show')) {
    document.getElementById('tt-hint').textContent =
      selected.has(name) ? '↩ Avmarkera' : '+ Klicka för att markera';
  }
}

function clearSelection() {
  selected.clear();
  refreshClasses();
  renderSelPanel();
}

function refreshClasses() {
  const hasSel = selected.size > 0;
  d3.selectAll('.kommune')
    .classed('selected', d => selected.has(d.properties.kom_namn))
    .classed('dimmed',   d => hasSel && !selected.has(d.properties.kom_namn));
  document.getElementById('btn-rensa').disabled = !hasSel;
}

/* ─── SELECTED PANEL ──────────────────────────────────────────────── */
function renderSelPanel() {
  const list    = document.getElementById('sel-list');
  const empty   = document.getElementById('sel-empty');
  const totalEl = document.getElementById('sel-total');

  if (selected.size === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    totalEl.textContent = '—';
    return;
  }

  let sum = 0;
  list.innerHTML = '';
  [...selected].sort().forEach(name => {
    const cnt = getPermits(name);
    sum += cnt;
    const el = document.createElement('div');
    el.className = 'sel-item';
    el.innerHTML =
      `<span class="sel-dot" style="background:${getColor(name)}"></span>` +
      `<span class="sel-name">${name}</span>` +
      `<span class="sel-count">${cnt.toLocaleString('sv-SE')}</span>` +
      `<span class="sel-x">×</span>`;
    el.addEventListener('click', () => {
      selected.delete(name);
      refreshClasses();
      renderSelPanel();
    });
    list.appendChild(el);
  });
  totalEl.textContent = sum.toLocaleString('sv-SE');
}

/* ─── WIDGET ──────────────────────────────────────────────────────── */
function updateWidget() {
  const total = Object.values(permitsByKommun).reduce((a, b) => a + b, 0);
  const komms = geoData ? geoData.features.length : 0;
  document.getElementById('widget-badge').textContent = total ? total.toLocaleString('sv-SE') : '—';
  document.getElementById('widget-sub').textContent   = `${komms} kommuner`;
  document.getElementById('sheet-sub').textContent    = total
    ? `${total.toLocaleString('sv-SE')} bygglov · ${komms} kommuner`
    : `${komms} kommuner · inga bygglov hittade`;
}

/* ─── SHEET OPEN / CLOSE ──────────────────────────────────────────── */
function openSheet() {
  const overlay = document.getElementById('overlay');
  const sheet   = document.getElementById('sheet');
  overlay.style.display = 'block';
  requestAnimationFrame(() => {
    overlay.classList.add('visible');
    sheet.classList.add('open');
    /* Render full map after sheet is visible + layout is ready */
    setTimeout(renderFullMap, 40);
  });
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  const overlay = document.getElementById('overlay');
  const sheet   = document.getElementById('sheet');
  overlay.classList.remove('visible');
  sheet.classList.remove('open');
  setTimeout(() => {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  }, 380);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
});

/* ─── ERROR ───────────────────────────────────────────────────────── */
function showError(msg) {
  const loader = document.getElementById('map-loader');
  if (loader) { loader.textContent = msg; loader.classList.remove('hidden'); }
  document.getElementById('widget-sub').textContent = 'Fel vid laddning';
}

/* ─── BOOT ────────────────────────────────────────────────────────── */
init().catch(err => {
  console.error('[karta]', err);
  showError('Kunde inte ladda kartan.');
});
</script>
