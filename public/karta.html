<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockholms kommuner — ByggSignal</title>
<style>
:root {
  --forest:      #1C3829;
  --forest-mid:  #2A5240;
  --sage:        #4A7C59;
  --mint:        #E8F2EC;
  --mint-mid:    #A8CCBA;
  --cream:       #F8F8F6;
  --white:       #FFFFFF;
  --ink:         #1A1A1A;
  --ink-light:   #5A5A5A;
  --ink-lighter: #AAAAAA;
  --border:      #EBEBEB;
  --border-soft: #F4F4F4;
  --gold:        #B8860B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
}

/* ─── LAYOUT: map left, panel right ─────────────────── */
#layout {
  display: flex;
  width: 100%; height: 100%;
}

/* ─── MAP AREA ───────────────────────────────────────── */
#map-wrap {
  flex: 1;
  position: relative;
  background: #d4e8f0;
  overflow: hidden;
  min-width: 0;
}

#full-svg { width: 100%; height: 100%; display: block; }

.map-loader {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--ink-lighter);
  background: #d4e8f0; z-index: 5;
  transition: opacity 0.4s;
}
.map-loader.hidden { opacity: 0; pointer-events: none; }

.kommune {
  cursor: pointer;
  stroke: rgba(255,255,255,0.7);
  stroke-width: 0.5;
  transition: filter 0.1s;
}
.kommune:hover   { filter: brightness(1.12); stroke: #fff; stroke-width: 1; }
.kommune.selected { stroke: var(--gold); stroke-width: 2; }
.kommune.dimmed  { opacity: 0.4; }

/* ─── LEGEND ─────────────────────────────────────────── */
.legend {
  position: absolute; bottom: 16px; left: 14px;
  background: rgba(255,255,255,0.93);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 11px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  pointer-events: none;
}
.legend-title {
  font-weight: 500; color: var(--forest);
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 8px;
}
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-swatch {
  width: 12px; height: 12px; border-radius: 3px;
  border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0;
}
.legend-lbl { color: var(--ink-light); }

/* ─── TOOLTIP ────────────────────────────────────────── */
#tooltip {
  position: fixed; pointer-events: none; z-index: 300;
  background: var(--forest); color: #fff;
  border-radius: 10px; padding: 10px 13px;
  font-size: 13px; line-height: 1.5;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity 0.1s;
  max-width: 190px;
}
#tooltip.show { opacity: 1; }
.tt-name  { font-weight: 500; font-size: 14px; }
.tt-count { color: rgba(255,255,255,0.7); font-size: 12px; }
.tt-hint  { color: #B8860B; font-size: 11px; margin-top: 3px; }

/* ─── SELECTED PANEL ─────────────────────────────────── */
#sel-panel {
  width: 240px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; background: var(--white);
}
.sel-hdr {
  padding: 14px 16px 10px;
  font-size: 11px; font-weight: 500;
  color: var(--ink-lighter);
  text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
#sel-list {
  flex: 1; overflow-y: auto; padding: 8px 10px;
}
.sel-empty {
  padding: 16px; font-size: 13px;
  color: var(--ink-lighter); font-weight: 300; line-height: 1.6;
}
.sel-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px; border-radius: 7px; margin-bottom: 3px;
  cursor: pointer; background: var(--cream);
  border: 1px solid var(--border-soft);
  transition: background 0.12s;
}
.sel-item:hover { background: var(--mint); }
.sel-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sel-name { flex: 1; font-size: 12px; font-weight: 500; }
.sel-count { font-size: 11px; color: var(--ink-lighter); }
.sel-x { font-size: 14px; color: var(--ink-lighter); opacity: 0.5; }
.sel-item:hover .sel-x { opacity: 1; }

.sel-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border-soft); flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.sel-total-row { display: flex; justify-content: space-between; align-items: baseline; }
.sel-total-lbl { font-size: 11px; color: var(--ink-lighter); }
.sel-total-val { font-size: 17px; font-weight: 500; color: var(--forest); }
#btn-rensa {
  font-family: inherit; font-size: 12px; font-weight: 500;
  color: var(--sage); background: var(--mint);
  border: 1px solid var(--sage); padding: 5px 12px;
  border-radius: 100px; cursor: pointer; width: 100%;
  transition: background 0.12s, color 0.12s;
}
#btn-rensa:hover   { background: var(--sage); color: var(--white); }
#btn-rensa:disabled { opacity: 0.35; cursor: default; }
#btn-rensa:disabled:hover { background: var(--mint); color: var(--sage); }

/* ─── MOBILE ─────────────────────────────────────────── */
@media (max-width: 600px) {
  #layout { flex-direction: column; }
  #sel-panel {
    width: 100%; height: 150px;
    flex-shrink: 0; flex-direction: row;
    border-left: none; border-top: 1px solid var(--border);
  }
  .sel-hdr { display: none; }
  #sel-list {
    flex: 1; display: flex; flex-direction: row;
    overflow-x: auto; overflow-y: hidden;
    padding: 10px 12px; gap: 6px;
  }
  .sel-item {
    flex-shrink: 0; min-width: 120px;
    flex-direction: column; align-items: flex-start; gap: 4px;
  }
  .sel-footer {
    width: 110px; flex-shrink: 0;
    justify-content: center;
  }
}
</style>
</head>
<body>

<div id="layout">
  <div id="map-wrap">
    <svg id="full-svg"></svg>
    <div class="legend" id="legend">
      <div class="legend-title">Bygglov totalt</div>
    </div>
    <div class="map-loader" id="map-loader">Laddar karta...</div>
  </div>
  <div id="sel-panel">
    <div class="sel-hdr">Valda kommuner</div>
    <div id="sel-list">
      <div class="sel-empty" id="sel-empty">Klicka pa en kommun for att markera</div>
    </div>
    <div class="sel-footer">
      <div class="sel-total-row">
        <span class="sel-total-lbl">Totalt</span>
        <span class="sel-total-val" id="sel-total">—</span>
      </div>
      <button id="btn-rensa" disabled onclick="clearSelection()">Rensa val</button>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-count" id="tt-count"></div>
  <div class="tt-hint" id="tt-hint"></div>
</div>

/* ─── CONFIG ────────────────────────────────────────── */
const COLOR_STEPS = ['#E8F2EC','#A8CCBA','#4A7C59','#2A5240','#1C3829'];

const GEO_TO_PERMIT = {
  'Stockholm': 'Stockholm stad',
};

/* ─── STATE ─────────────────────────────────────────── */
let permitsByKommun = {};
let colorScale      = null;
const selected      = new Set();

/* ─── HELPERS ───────────────────────────────────────── */
function norm(s) { return (s || '').trim().toLowerCase(); }

function permitKey(geoName) {
  return norm(GEO_TO_PERMIT[geoName] || geoName);
}

function getPermits(geoName) {
  return permitsByKommun[permitKey(geoName)] || 0;
}

function getColor(geoName) {
  return colorScale ? colorScale(getPermits(geoName)) : COLOR_STEPS[0];
}

function shortenName(name) {
  const short = { 'Upplands Vasby': 'Uppl. Vasby', 'Upplands-Bro': 'Uppl.-Bro' };
  return short[name] || name;
}

/* ─── LEGEND ────────────────────────────────────────── */
function buildLegend() {
  const q = colorScale.quantiles();
  const fmt = n => Math.round(n).toLocaleString('sv-SE');
  const labels = [
    `0 – ${fmt(q[0])}`,
    `${fmt(q[0])+1} – ${fmt(q[1])}`,
    `${fmt(q[1])+1} – ${fmt(q[2])}`,
    `${fmt(q[2])+1} – ${fmt(q[3])}`,
    `${fmt(q[3])+1}+`
  ];
  document.getElementById('legend').innerHTML =
    '<div class="legend-title">Bygglov totalt</div>' +
    COLOR_STEPS.map((c, i) =>
      `<div class="legend-row">
        <span class="legend-swatch" style="background:${c}"></span>
        <span class="legend-lbl">${labels[i]}</span>
       </div>`
    ).join('');
}

/* ─── MAP RENDER ────────────────────────────────────── */
function renderMap() {
  const wrap = document.getElementById('map-wrap');
  const W    = wrap.clientWidth  || 500;
  const H    = wrap.clientHeight || 500;
  const PAD  = 24;

  const svg = d3.select('#full-svg')
    .attr('viewBox', `0 0 ${W} ${H}`);

  const proj = d3.geoMercator();
  proj.fitExtent([[PAD, PAD], [W - PAD, H - PAD]], GEO_DATA);
  const path = d3.geoPath().projection(proj);

  const g = svg.append('g');

  g.selectAll('.kommune')
    .data(GEO_DATA.features)
    .join('path')
    .attr('class', 'kommune')
    .attr('d', path)
    .attr('fill', d => getColor(d.properties.kom_namn))
    .on('mousemove', onMouseMove)
    .on('mouseleave', onMouseLeave)
    .on('click', onClick);

  g.selectAll('.k-label')
    .data(GEO_DATA.features)
    .join('text')
    .attr('class', 'k-label')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('font-family', 'DM Sans, sans-serif')
    .attr('pointer-events', 'none')
    .each(function(d) {
      const [[x0,y0],[x1,y1]] = path.bounds(d);
      const w = x1 - x0, h = y1 - y0;
      const show = w > 32 && h > 16;
      const sz   = Math.min(Math.max(w / 7, 8), 12);
      const cnt  = getPermits(d.properties.kom_namn);
      const dark = cnt > (colorScale ? colorScale.quantiles()[2] || 0 : 0);
      d3.select(this)
        .attr('transform', () => {
          const [cx, cy] = path.centroid(d);
          return `translate(${cx},${cy})`;
        })
        .attr('font-size', show ? sz : 0)
        .attr('fill', dark ? 'rgba(255,255,255,0.88)' : 'rgba(28,56,41,0.75)')
        .text(show ? shortenName(d.properties.kom_namn) : '');
    });

  new ResizeObserver(() => {
    const nW = wrap.clientWidth;
    const nH = wrap.clientHeight;
    if (!nW || !nH) return;
    svg.attr('viewBox', `0 0 ${nW} ${nH}`);
    proj.fitExtent([[PAD, PAD], [nW - PAD, nH - PAD]], GEO_DATA);
    path.projection(proj);
    g.selectAll('.kommune').attr('d', path);
    g.selectAll('.k-label').each(function(d) {
      const [cx, cy] = path.centroid(d);
      d3.select(this).attr('transform', `translate(${cx},${cy})`);
      const [[x0,y0],[x1,y1]] = path.bounds(d);
      const w = x1 - x0, h = y1 - y0;
      const show = w > 32 && h > 16;
      const sz   = Math.min(Math.max(w / 7, 8), 12);
      d3.select(this)
        .attr('font-size', show ? sz : 0)
        .text(show ? shortenName(d.properties.kom_namn) : '');
    });
  }).observe(wrap);

  document.getElementById('map-loader').classList.add('hidden');
}

/* ─── TOOLTIP ────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');

function onMouseMove(evt, d) {
  const name = d.properties.kom_namn || '—';
  const cnt  = getPermits(name);
  document.getElementById('tt-name').textContent  = name;
  document.getElementById('tt-count').textContent =
    cnt ? `${cnt.toLocaleString('sv-SE')} bygglov` : 'Inga bygglov registrerade';
  document.getElementById('tt-hint').textContent =
    selected.has(name) ? 'Klicka for att avmarkera' : 'Klicka for att markera';
  tooltip.classList.add('show');
  const x = Math.min(evt.clientX + 14, window.innerWidth - 196);
  const y = Math.max(evt.clientY - 10, 8);
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function onMouseLeave() { tooltip.classList.remove('show'); }

/* ─── SELECT ────────────────────────────────────────── */
function onClick(evt, d) {
  const name = d.properties.kom_namn;
  if (!name) return;
  selected.has(name) ? selected.delete(name) : selected.add(name);
  refreshClasses();
  renderSelPanel();
  /* Notify parent frame if embedded in iframe */
  try {
    window.parent.postMessage({ type: 'kommunerSelected', kommuner: [...selected] }, '*');
  } catch(e) {}
}

function clearSelection() {
  selected.clear();
  refreshClasses();
  renderSelPanel();
  try {
    window.parent.postMessage({ type: 'kommunerSelected', kommuner: [] }, '*');
  } catch(e) {}
}

function refreshClasses() {
  const hasSel = selected.size > 0;
  d3.selectAll('.kommune')
    .classed('selected', d => selected.has(d.properties.kom_namn))
    .classed('dimmed',   d => hasSel && !selected.has(d.properties.kom_namn));
  document.getElementById('btn-rensa').disabled = !hasSel;
}

/* ─── SELECTED PANEL ─────────────────────────────────── */
function renderSelPanel() {
  const list    = document.getElementById('sel-list');
  const empty   = document.getElementById('sel-empty');
  const totalEl = document.getElementById('sel-total');

  if (selected.size === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    totalEl.textContent = '—';
    return;
  }

  let sum = 0;
  list.innerHTML = '';
  [...selected].sort().forEach(name => {
    const cnt = getPermits(name);
    sum += cnt;
    const el = document.createElement('div');
    el.className = 'sel-item';
    el.innerHTML =
      `<span class="sel-dot" style="background:${getColor(name)}"></span>` +
      `<span class="sel-name">${name}</span>` +
      `<span class="sel-count">${cnt.toLocaleString('sv-SE')}</span>` +
      `<span class="sel-x">x</span>`;
    el.addEventListener('click', () => {
      selected.delete(name);
      refreshClasses();
      renderSelPanel();
      try {
        window.parent.postMessage({ type: 'kommunerSelected', kommuner: [...selected] }, '*');
      } catch(e) {}
    });
    list.appendChild(el);
  });
  totalEl.textContent = sum.toLocaleString('sv-SE');
}

/* ─── INIT ───────────────────────────────────────────── */
async function init() {
  /* Fetch permits */
  try {
    const resp = await fetch('/api/permits');
    if (resp.ok) {
      const raw = await resp.json();
      if (Array.isArray(raw)) {
        raw.forEach(p => {
          const k = norm(p.kommun);
          if (k) permitsByKommun[k] = (permitsByKommun[k] || 0) + 1;
        });
      }
    }
  } catch(e) {
    console.warn('[karta] Kunde inte hamta permits:', e);
  }

  /* Color scale */
  const counts = GEO_DATA.features.map(f => getPermits(f.properties.kom_namn));
  colorScale = d3.scaleQuantile()
    .domain(counts.filter(c => c > 0).concat([0]))
    .range(COLOR_STEPS);

  buildLegend();
  renderMap();
}

init().catch(err => {
  console.error('[karta]', err);
  const loader = document.getElementById('map-loader');
  if (loader) loader.textContent = 'Kunde inte ladda kartan.';
});
</script>
