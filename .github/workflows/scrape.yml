  # ── SiteVision: 172 configs split into 6 parallel batches ──────────
  # Each batch handles ~29 configs. With ~30s per config = ~15 min per batch.
  sitevision-batch1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 \
            fonts-liberation libx11-xcb1 libxext6
          sudo apt-get install -y libasound2t64 2>/dev/null || \
          sudo apt-get install -y libasound2     2>/dev/null || true
          npx puppeteer browsers install chrome
      - name: "SiteVision batch 1/6 (a-b)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          configs=$(find scrapers/configs -maxdepth 1 -name '*.json' | sort | while read f; do
            c=$(basename "$f" | cut -c1); if [[ "$c" < "c" ]]; then echo "$f"; fi; done)
          total=$(echo "$configs" | grep -c . || true)
          echo "Batch 1/6 (a-b): $total configs"
          s=0; fail=0
          for config in $configs; do
            echo "── $(basename "$config" .json)"
            if timeout 120 node scrapers/scrape-sitevision.js --save --config "$config" 2>&1; then
              s=$((s+1)); else fail=$((fail+1)); fi
          done
          echo "Klar: $s OK, $fail FEL av $total"

