name: Daily Scraping

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 06:00 svensk tid, varje dag
    - cron: '0 17 * * *'   # 17:00 UTC = 18:00 svensk tid, kväll
  workflow_dispatch:         # manuell trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgconf-2-4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            fonts-liberation \
            libnspr4 \
            libnss3 \
            libx11-xcb1

      - name: Run all scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CI: 'true'
        run: node scripts/run-all-scrapers.js
