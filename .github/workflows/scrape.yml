name: Daily Scraping

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC = 14:00 CET, varje dag
  workflow_dispatch:         # manuell trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 \
            fonts-liberation libx11-xcb1 libxext6
          sudo apt-get install -y libasound2t64 2>/dev/null || \
          sudo apt-get install -y libasound2     2>/dev/null || true
          npx puppeteer browsers install chrome

      - name: Run all scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CI: 'true'
        run: node scripts/run-all-scrapers.js

      - name: Run Sitevision scrapers (alla län)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Hittar Sitevision-configs..."
          configs=$(find scrapers/configs -maxdepth 1 -name '*.json' | sort)
          total=$(echo "$configs" | wc -l | tr -d ' ')
          echo "Hittade $total configs"
          echo ""

          successes=0
          failures=0

          for config in $configs; do
            kommun=$(basename "$config" .json)
            echo "──────────────────────────────"
            echo "Kör: $kommun ($config)"

            if node scrapers/scrape-sitevision.js --save --config "$config" 2>&1; then
              echo "$kommun: OK"
              successes=$((successes + 1))
            else
              echo "$kommun: FEL (fortsätter)"
              failures=$((failures + 1))
            fi
            echo ""
          done

          echo "══════════════════════════════"
          echo "Sitevision klar: $successes lyckades, $failures misslyckades av $total"

          # Fail only if ALL failed
          if [ "$successes" -eq 0 ] && [ "$total" -gt 0 ]; then
            echo "Alla Sitevision-scrapers misslyckades!"
            exit 1
          fi

      - name: Run Netpublicator scrapers (alla län)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CI: 'true'
        run: |
          echo "Hittar Netpublicator-configs..."
          configs=$(find scrapers/configs/netpublicator -name '*.json' 2>/dev/null | sort)
          total=$(echo "$configs" | wc -l | tr -d ' ')
          echo "Hittade $total configs"
          echo ""

          successes=0
          failures=0

          for config in $configs; do
            kommun=$(basename "$config" .json)
            echo "──────────────────────────────"
            echo "Kör: $kommun ($config)"

            if timeout 60 node scrapers/scrape-netpublicator.js --save --config "$config" 2>&1; then
              echo "$kommun: OK"
              successes=$((successes + 1))
            else
              echo "$kommun: FEL (fortsätter)"
              failures=$((failures + 1))
            fi
            echo ""
          done

          echo "══════════════════════════════"
          echo "Netpublicator klar: $successes lyckades, $failures misslyckades av $total"

          if [ "$successes" -eq 0 ] && [ "$total" -gt 0 ]; then
            echo "Alla Netpublicator-scrapers misslyckades!"
            exit 1
          fi
