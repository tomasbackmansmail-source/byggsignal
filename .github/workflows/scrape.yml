  sitevision-batch1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 \
            fonts-liberation libx11-xcb1 libxext6
          sudo apt-get install -y libasound2t64 2>/dev/null || \
          sudo apt-get install -y libasound2     2>/dev/null || true
          npx puppeteer browsers install chrome

      - name: Run Sitevision scrapers (A-L)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Hittar Sitevision-configs A-L..."
          configs=$(find scrapers/configs -maxdepth 1 -name '*.json' | sort | while read f; do
            name=$(basename "$f")
            first=$(echo "$name" | cut -c1)
            if [[ "$first" < "m" ]]; then echo "$f"; fi
          done)
          total=$(echo "$configs" | grep -c . || true)
          echo "Hittade $total configs (A-L)"
          echo ""

          successes=0
          failures=0

          for config in $configs; do
            kommun=$(basename "$config" .json)
            echo "──────────────────────────────"
            echo "Kör: $kommun ($config)"

            if node scrapers/scrape-sitevision.js --save --config "$config" 2>&1; then
              echo "$kommun: OK"
              successes=$((successes + 1))
            else
              echo "$kommun: FEL (fortsätter)"
              failures=$((failures + 1))
            fi
            echo ""
          done

          echo "══════════════════════════════"
          echo "Sitevision A-L klar: $successes lyckades, $failures misslyckades av $total"

          if [ "$successes" -eq 0 ] && [ "$total" -gt 0 ]; then
            echo "Alla Sitevision A-L scrapers misslyckades!"
            exit 1
          fi

